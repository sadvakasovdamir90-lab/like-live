<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap');

        body {
            background: transparent;
            font-family: 'Black Ops One', cursive;
            margin: 0;
            display: flex;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .like-card {
    position: absolute;
    left: 20px; /* Сол жақтан 20px жылжытып қой */
    width: 350px;
    background: rgba(0, 0, 0, 0.8); /* Қара түс анық көрінуі үшін */
    border-left: 10px solid #ffcc00;
    padding: 20px;
    color: white; /* Жазулар ақ түспен */
}

        .active {
            transform: translateX(0); /* Лайк келгенде шығады */
        }

        .user-label {
            color: #fff;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .username {
            color: #ffcc00;
            font-size: 28px;
            text-shadow: 2px 2px 5px #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .amount-box {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 24px;
        }

        .fire-icon {
            font-size: 30px;
            animation: bounce 0.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="like-card" id="card">
        <div class="user-label">NEW LIKER</div>
        <div class="username" id="user">RANDOM USER</div>
        <div class="amount-box">
            <span class="fire-icon">🔥</span>
            <span id="count">x0</span> LIKES
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        var socket = io();
        var timer;

        socket.on('new_like', function(data) {
            const card = document.getElementById('card');
            document.getElementById('user').innerText = data.username;
            document.getElementById('count').innerText = "x" + data.amount;

            // Виджетті көрсету
            card.classList.add('active');

            // 5 секундтан кейін қайтадан жасырып қою
            clearTimeout(timer);
            timer = setTimeout(() => {
                card.classList.remove('active');
            }, 5000);
        });
    </script>
</body>
</html>
